# Include this file inside the ialexey.ru nginx server block.
# The Astro build fingerprints /_astro assets, so they can be cached for a year.

location ^~ /_astro/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location ^~ /habr-images/ {
    access_log off;
    add_header Cache-Control "public, max-age=2592000" always;
    try_files $uri =404;
}

location ~* ^/(avatar-small\.webp|avatar-small\.png|favicon\.svg|favicon\.ico|bot-screenshot\.jpg)$ {
    access_log off;
    add_header Cache-Control "public, max-age=2592000" always;
    try_files $uri =404;
}

location ~* ^/(feed\.xml|feed\.json|llms\.txt|index\.md|robots\.txt|sitemap.*\.xml)$ {
    add_header Cache-Control "public, max-age=60" always;
    try_files $uri =404;
}

location ~* \.html$ {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
}
